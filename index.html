<!DOCTYPE html>
<html lang="en">

    <head>
        <meta charset="UTF-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">

        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet"
            integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3" crossorigin="anonymous">
        <link rel="stylesheet" href="https://pro.fontawesome.com/releases/v5.10.0/css/all.css"
            integrity="sha384-AYmEC3Yw5cVb3ZcuHtOA93w35dYTsvhLPVnYs9eStHfGJvOvKxVfELGroGkvsg+p"
            crossorigin="anonymous" />
        <link rel="stylesheet" href="./CSS/style.css">
        <script src="./Scripts/Controller/task-input.js" type="module"></script>

        <title>Task Manager </title>
    </head>

    <body>

        <div class="container">
            <h1 class="alert-success text-center">Task Manager App</h1>
            <br>

            <div class="form-group">
                <label for="id">Id</label>
                <label class="form-control" id="id">
            </div>

            <div class="form-group">
                <label for="name">Name</label>
                <input class="form-control" type="text" id="name" placeholder="Type Name Here">
            </div>

            <div class="form-group">
                <label for="desc">Description</label>
                <textarea class="form-control" id="desc" cols="30" rows="10"
                    placeholder="Type Description Here"></textarea>
            </div>

            <div class="form-group">
                <label for="date">Date</label>
                <input class="form-control" type="date" id="date">
            </div>

            <div class="form-group">
                <label for="url">URL</label>
                <input class="form-control" type="url" id="url" placeholder="Type URL Here">
            </div>

            <div class="form-group">
                <label for="pr">Priority <span>0</span></label>
                <input class="form-range" type="range" id="pr" min="0" max="10" step="1">
                <span>10</span>
                <p>Current Priority <span id="current-pr"></span></p>
            </div>
            <br>

            <div>
                <button class="btn btn-primary" id="add">Add</button>
                <button class="btn btn-danger" id="delete">Delete</button>
                <button class="btn btn-info" id="search">Search</button>
                <button class="btn btn-secondary" id="update">Update</button>
                <button class="btn btn-warning" id="sort">Sort</button>
                <button class="btn btn-success" id="save">Save</button>
                <button class="btn btn-dark" id="load">Load</button>
                <button class="btn btn-success" id="load-server">Load From Server</button>
                <button class="btn btn-danger" id="clear">Clear All</button>
            </div>
            <br>

            <div>
                <h2>Total Records <span id="total-rec">0</span></h2>
                <h2>Marked Records <span id="marked-rec">0</span></h2>
                <h2>Unmarked Records <span id="unmarked-rec">0</span></h2>
            </div>
            <br>

            <div>
                <table class="table table-bordered">
                    <thead class="table-dark">
                        <tr>
                            <th>Id</th>
                            <th>Name</th>
                            <th>Description</th>
                            <th>Date</th>
                            <th>URL</th>
                            <th>Priority</th>
                            <th>Operations</th>
                        </tr>
                    </thead>

                    <tbody id="table-body"></tbody>
                </table>
            </div>

            <div id="search-results">

            </div>
        </div>
    </body>

</html>
